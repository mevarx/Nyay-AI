<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — NyayAI</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body style="background-color: var(--color-bg)">

  <!-- Minimal Navbar for Auth Pages -->
  <nav class="navbar animate-on-scroll">
    <div class="container navbar__inner" style="justify-content: center;">
      <a href="index.html" class="navbar__logo">
        <span class="logo-nyay">Nyay</span><span class="logo-ai">AI</span>
      </a>
    </div>
  </nav>

  <main class="container auth-main animate-on-scroll" style="display: flex; justify-content: center; padding: var(--space-12) var(--space-6);">
    <div class="auth-card card" style="width: 100%; max-width: 440px;">
      <h1 class="auth-card__title" style="text-align: center; color: var(--color-primary); margin-bottom: var(--space-6);">Welcome back</h1>
      
      <button class="btn-social btn-full" style="background-color: rgba(255,255,255,0.05); color: var(--color-text); border: 1px solid var(--color-border); padding: var(--space-3); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: var(--space-6);">
         <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
         </svg>
        Sign in with Google
      </button>

      <div class="auth-divider" style="display: flex; align-items: center; text-align: center; color: var(--color-text-muted); margin-bottom: var(--space-6);">
        <hr style="flex-grow: 1; border: none; border-top: 1px solid var(--color-border);"><span style="padding: 0 10px;">or</span><hr style="flex-grow: 1; border: none; border-top: 1px solid var(--color-border);">
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group" style="margin-bottom: var(--space-4);">
          <label for="email" style="display: block; margin-bottom: var(--space-2); color: var(--color-text-muted);">Work Email</label>
          <input type="email" id="email" required placeholder="you@company.com" style="width: 100%; padding: var(--space-3); background-color: rgba(255,255,255,0.05); border: 1px solid var(--color-border); border-radius: var(--radius-sm); color: white;">
        </div>
        
        <div class="form-group" style="margin-bottom: var(--space-6);">
          <div style="display: flex; justify-content: space-between; margin-bottom: var(--space-2);">
            <label for="password" style="color: var(--color-text-muted);">Password</label>
            <a href="#" class="text-xs" style="color: var(--color-primary);">Forgot password?</a>
          </div>
          <div class="password-input-wrapper" style="position: relative;">
            <input type="password" id="password" required placeholder="••••••••" style="width: 100%; padding: var(--space-3); background-color: rgba(255,255,255,0.05); border: 1px solid var(--color-border); border-radius: var(--radius-sm); color: white;">
            <button type="button" class="btn-toggle-password" onclick="togglePasswordVisibility('password')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--color-text-muted);">
               <svg class="icon" viewBox="0 0 24 24" style="width: 18px; height: 18px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary btn-full btn-large">Log In →</button>
      </form>

      <p class="auth-redirect" style="text-align: center; margin-top: var(--space-6); color: var(--color-text-muted);">
        Don't have an account? <a href="signup.html" style="color: var(--color-primary); font-weight: 600;">Sign up</a>
      </p>
    </div>
  </main>

  <script>
    function togglePasswordVisibility(inputId) {
      const input = document.getElementById(inputId);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
    function handleLogin(e) {
      e.preventDefault();
      // Mock login -> redirect to dashboard
      window.location.href = 'dashboard.html';
    }
  </script>
  <script src="js/animations.js"></script>
</body>
</html>
