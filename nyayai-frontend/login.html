<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — NyayAI</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/auth.css">
  <script src="js/config.js"></script>
  <script type="module" src="js/auth.js"></script>
</head>
<body class="auth-page">

  <!-- Minimal Navbar for Auth Pages -->
  <nav class="navbar navbar--auth animate-on-scroll">
    <div class="container navbar__inner" style="justify-content: center;">
      <a href="index.html" class="navbar__logo">
        <span class="logo-nyay">Nyay</span><span class="logo-ai">AI</span>
      </a>
    </div>
  </nav>

  <main class="animate-on-scroll" style="width: 100%; display: flex; justify-content: center;">
    <div class="auth-card card">
      <h1 class="auth-card__title" style="text-align: center; color: var(--color-primary); margin-bottom: var(--space-6);">Welcome back</h1>
      
      <div style="width: 100%; display: flex; justify-content: center;">
        <button class="btn-google" id="google-login-btn">
           <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
           </svg>
          Sign in with Google
        </button>
      </div>

      <div class="auth-divider">or</div>

      <!-- Email/Password -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" required placeholder="you@example.com" autocomplete="email">
        </div>
        
        <div class="form-group">
          <div style="display: flex; justify-content: space-between; margin-bottom: var(--space-2);">
            <label for="login-password">Password</label>
            <a href="#" class="forgot-password">Forgot?</a>
          </div>
          <div class="password-input-wrapper">
            <input type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="show-hide-btn" onclick="togglePasswordVisibility('login-password', this)">Show</button>
          </div>
        </div>

        <div id="login-error-banner" class="error-banner" style="display:none"></div>

        <button type="submit" class="btn-primary btn-full btn-large" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
          <span id="login-btn-text">Log In →</span>
          <span id="login-spinner" class="spinner" style="display:none"></span>
        </button>
      </form>

      <p class="auth-switch">
        Don't have an account? <a href="signup.html">Sign up</a>
      </p>
    </div>
  </main>

  <script>
    // Wire Google button
    document.getElementById('google-login-btn').addEventListener('click', function() {
      if (typeof signInWithGoogle === 'function') signInWithGoogle();
      else alert('Auth module still loading. Please try again.');
    });

    async function handleLogin(e) {
      e.preventDefault();
      document.getElementById('login-error-banner').style.display = 'none';

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        showLoginError('Please fill in all fields.');
        return;
      }

      setLoginLoading(true);

      // Wait for auth module to be available
      if (typeof signIn !== 'function') {
        showLoginError('Auth module not loaded yet. Please wait a moment and try again.');
        setLoginLoading(false);
        return;
      }

      const result = await signIn(email, password);

      if (!result.success) {
        setLoginLoading(false);
        showLoginError(result.message);
        return;
      }

      // Success — redirect to upload
      window.location.href = 'upload.html';
    }

    function showLoginError(message) {
      const banner = document.getElementById('login-error-banner');
      banner.textContent = message;
      banner.style.display = 'block';
    }

    function setLoginLoading(isLoading) {
      document.getElementById('login-btn-text').style.display = isLoading ? 'none' : 'inline';
      document.getElementById('login-spinner').style.display = isLoading ? 'inline-block' : 'none';
    }

    function togglePasswordVisibility(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') { input.type = 'text'; btn.textContent = 'Hide'; }
      else { input.type = 'password'; btn.textContent = 'Show'; }
    }
  </script>
  <script src="js/animations.js"></script>
</body>
</html>
