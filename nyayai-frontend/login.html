<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyayAI — Log In</title>
  <link rel="stylesheet" href="css/base.css">
  <script src="js/config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #000; font-family: 'Inter', sans-serif;
      margin: 0; color: #fff;
      background-image: radial-gradient(circle at 50% 0%, rgba(129,140,248,0.15), transparent 50%);
    }
    .auth-card {
      background: rgba(20,20,20,0.85); backdrop-filter: blur(12px);
      padding: 44px 40px; border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.1);
      text-align: center; max-width: 400px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .logo {
      font-size: 26px; font-weight: 700; text-decoration: none;
      display: flex; align-items: center; justify-content: center; margin-bottom: 24px;
    }
    .logo svg { width: 30px; height: 30px; margin-right: 8px; stroke: #818cf8; fill: none; }
    .logo-nyay { color: #fff; }
    .logo-ai   { color: #f59e0b; }
    h1 { font-size: 22px; margin: 0 0 8px; font-weight: 600; }
    .subtitle { color: #9ca3af; font-size: 14px; margin: 0 0 32px; line-height: 1.5; }
    .google-btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; background: #fff; color: #111; padding: 13px 20px;
      border-radius: 9px; font-weight: 600; cursor: pointer; border: none;
      font-size: 15px; gap: 10px; transition: background 0.2s, transform 0.15s;
    }
    .google-btn:hover { background: #f1f1f1; transform: translateY(-1px); }
    .google-btn:active { transform: translateY(0); }
    .google-icon { width: 20px; height: 20px; flex-shrink: 0; }
    .back { display: inline-block; margin-top: 24px; color: #6b7280; font-size: 13px; text-decoration: none; }
    .back:hover { color: #d1d5db; }
  </style>
</head>
<body>
  <div class="auth-card">
    <a href="index.html" class="logo">
      <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3L12 21M3 9L12 3L21 9M5 12L3 18H9L7 12H5ZM19 12L17 18H23L21 12H19Z"/>
      </svg>
      <span class="logo-nyay">Nyay</span><span class="logo-ai">AI</span>
    </a>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to access your bias audit dashboard and history.</p>

    <button class="google-btn" onclick="window.signInWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <a href="index.html" class="back">← Back to home</a>
  </div>
</body>
</html>
